name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      # Override .python-version so the matrix actually drives the interpreter
      # uv uses. Without this, .python-version (= 3.11) wins and uv silently
      # rebuilds the venv when matrix.python-version differs, dropping dev deps.
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project (with dev deps)
        run: uv sync --extra dev

      - name: Lint
        run: uv run --no-sync ruff check src tests

      - name: Run unit tests
        run: uv run --no-sync pytest tests/ --ignore=tests/integration -v
